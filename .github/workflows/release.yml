name: Release

# Manual trigger only — npm 2FA OTP must be entered locally for the actual publish.
# This workflow creates a GitHub release from a tag and verifies the published tarball.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (e.g. v3.5.0)
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify package
        run: |
          npm run check
          npm run smoke
          npm pack --dry-run

      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          awk "/^## \\[${VERSION}\\]/ { found=1; next } /^## \\[/ && found { exit } found" CHANGELOG.md > release-notes.md
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat release-notes.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          make_latest: true
