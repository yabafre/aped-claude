name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: check (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Syntax check
        run: npm run check

      - name: Smoke test (--version + --help)
        run: npm run smoke

      - name: Unit tests
        run: npm test

      - name: Guardrail generates valid bash + JSON
        run: |
          node -e "
            import('./src/templates/guardrail.js').then(m => {
              const files = m.guardrail({ apedDir: '.aped', outputDir: 'docs/aped' });
              process.stdout.write(files[0].content);
            });
          " > /tmp/aped-guardrail.sh
          bash -n /tmp/aped-guardrail.sh
          chmod +x /tmp/aped-guardrail.sh
          echo '{"prompt":"test prompt"}' | bash /tmp/aped-guardrail.sh | node -e '
            let d=""; process.stdin.on("data", c => d += c);
            process.stdin.on("end", () => {
              if (d.trim()) JSON.parse(d);
              console.log("OK");
            });
          '

      - name: Scaffold e2e (install → update → idempotent)
        run: bash .github/scripts/scaffold-e2e.sh

  scaffold-macos:
    name: scaffold e2e (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Scaffold e2e
        run: bash .github/scripts/scaffold-e2e.sh
